name: Dependency Submission

# Submits each deployable Gradle build's fully-resolved dependency graph to GitHub's
# dependency graph, so Dependabot security alerts cover the Gradle modules (including
# transitive deps).  GitHub auto-detects Maven pom.xml but NOT Gradle build.gradle, so
# without this the only thing scanned is front_end/package-lock.json (npm).
#
# The repo has no single root Gradle build; these 5 leaf builds each include the shared
# library modules as subprojects, so together they cover all JVM dependencies.

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write   # required for the action to submit the dependency graph

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - limelight_webapp
          - limelight_importer
          - limelight_run_importer
          - limelight_feature_detection_run_import
          - limelight_submit_import
    steps:
      - uses: actions/checkout@v7

      # Java 21 (LTS) is only used to RUN Gradle for dependency resolution; it does not
      # need to match the per-module toolchains (Java 8 / 25), which are only required to
      # compile, not to resolve dependencies.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate and submit dependency graph (${{ matrix.module }})
        uses: gradle/actions/dependency-submission@v4
        with:
          build-root-directory: ${{ matrix.module }}
