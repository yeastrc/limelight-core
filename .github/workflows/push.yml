name: Limelight Build CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Run build in Docker container	    
      uses: ghcr.io/yeastrc/limelight-build-docker:latest
      with:
        entrypoint: ant
        args: -f ant__build_all_limelight.xml
