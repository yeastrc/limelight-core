version: 2

# Dependabot VERSION-UPDATE PRs.
#
# Security ALERTS for the Gradle modules come from the dependency graph submitted by
# .github/workflows/dependency-submission.yml (GitHub does not auto-parse build.gradle).
# This file additionally opens scheduled PRs to bump DIRECT dependencies that are behind.

updates:
  # ---- npm: front end ----
  - package-ecosystem: "npm"
    directory: "/limelight_webapp/front_end"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Batch all available updates into ONE PR (per directory) instead of one PR
    # per dependency, to avoid a flood of PRs.
    groups:
      npm-dependencies:
        patterns:
          - "*"
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"

  # ---- Gradle: Java 25 JVM modules with declared dependencies ----
  - package-ecosystem: "gradle"
    directories:
      - "/limelight_webapp"
      - "/limelight_shared_code"
      - "/limelight_importer"
      - "/limelight_importer_run_importer_shared"
      - "/limelight_run_importer"
      - "/limelight_feature_detection_run_import"
      - "/limelight__db_populate_new_fields__common_code"
      - "/limelight__database_cleanup__common_code__remove_data_from_database"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # limelight_webapp deliberately pins com.sun.xml.bind:jaxb-impl at 2.3.1 as the
      # JAVAX (javax.xml.bind) JAXB 2 runtime -- paired with javax.xml.bind:jaxb-api:2.3.1 --
      # for the bundled yeastrc client-connector jars, coexisting with the separate JAKARTA
      # jaxb-runtime 4.0.x. Bumping this coordinate to 3.x/4.x breaks that javax pairing and
      # drags in a duplicate org.glassfish.jaxb:jaxb-core-4.x (already provided by jaxb-runtime),
      # which fails the WAR build (bootWar: duplicate WEB-INF/lib entry). Keep it on the 2.3.x line.
      - dependency-name: "com.sun.xml.bind:jaxb-impl"
        versions: [">=3.0.0"]
      # limelight_submit_import_client_connector is a Java-8 module and CANNOT take JAXB 4.x
      # (compiled for Java 11 / class-file 55.0). It is a Gradle SUBPROJECT of the webapp build
      # (limelight_webapp/settings.gradle includes it), so Dependabot reaches it while scanning
      # the webapp directory -- via THIS Java-25 group, bypassing the Java-8 group's own >=4.0.0
      # ignore below. Ignoring the semver-MAJOR bump here blocks that 3.x->4.x jump for the
      # connector while still letting the genuine Java-25 modules (webapp, importer, shared_code)
      # receive JAXB 4.x minor/patch updates. (Major JAXB bumps here are deliberately manual.)
      - dependency-name: "jakarta.xml.bind:jakarta.xml.bind-api"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.glassfish.jaxb:jaxb-runtime"
        update-types: ["version-update:semver-major"]
    # Batch all available updates into ONE PR per module directory instead of one
    # PR per dependency.
    groups:
      gradle-dependencies:
        patterns:
          - "*"
      gradle-security:
        applies-to: security-updates
        patterns:
          - "*"

  # ---- Gradle: Java 8 modules (submit_import + its client connector) ----
  # These two modules pin the Java 8 toolchain (JavaLanguageVersion.of(8)) so the
  # submit-import client can run under Java 8. The JAXB 4.x line (jakarta.xml.bind-api
  # and jaxb-runtime) is compiled for Java 11 (class-file version 55.0) and will NOT
  # compile under a Java 8 toolchain (needs 52.0) -- so keep these on the Java-8-
  # compatible JAXB 3.0.x line. Ignore the 4.x+ JAXB bumps here; the Java 25 modules
  # above still take them.
  - package-ecosystem: "gradle"
    directories:
      - "/limelight_submit_import"
      - "/limelight_submit_import_client_connector"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "jakarta.xml.bind:jakarta.xml.bind-api"
        versions: [">=4.0.0"]
      - dependency-name: "org.glassfish.jaxb:jaxb-runtime"
        versions: [">=4.0.0"]
    groups:
      gradle-dependencies:
        patterns:
          - "*"
      gradle-security:
        applies-to: security-updates
        patterns:
          - "*"

  # ---- GitHub Actions used by the workflows ----
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
