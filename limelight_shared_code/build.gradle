/*
 *  Application 'shared-code' folder
 *
 * This file was generated by the Gradle 'init' task.
 *
 * This generated file contains a sample Java Library project to get you started.
 * For more details take a look at the Java Libraries chapter in the Gradle
 * user guide available at https://docs.gradle.org/4.5/userguide/java_library_plugin.html
 */

plugins {
    // Apply the java-library plugin to add support for Java Library
    id 'java-library'
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

dependencies {

	// https://mvnrepository.com/artifact/org.slf4j/slf4j-api
	implementation 'org.slf4j:slf4j-api:1.7.36'

	// https://mvnrepository.com/artifact/org.apache.commons/commons-lang3
	implementation 'org.apache.commons:commons-lang3:3.12.0'
	
	// https://mvnrepository.com/artifact/com.fasterxml.jackson.core/jackson-core
	implementation 'com.fasterxml.jackson.core:jackson-core:2.19.1'
	
	// https://mvnrepository.com/artifact/com.fasterxml.jackson.core/jackson-databind
	implementation 'com.fasterxml.jackson.core:jackson-databind:2.19.1'
	
	
	//////////////////////////////
	
	// JAXB dependencies (Required for Java 11+)
	// 'api' (not 'implementation') so the jakarta.xml.bind-api is on consumers' COMPILE classpath:
	// this module's exported DTO classes are jakarta-annotated (@XmlAccessorType(XmlAccessType.FIELD)),
	// so consumers (importer_run_importer_shared, importer, ...) need the api jar to resolve those
	// annotation enum constants at compile time (otherwise javac warns "unknown enum constant").
	// https://mvnrepository.com/artifact/jakarta.xml.bind/jakarta.xml.bind-api
	api 'jakarta.xml.bind:jakarta.xml.bind-api:4.0.2'
	// https://mvnrepository.com/artifact/org.glassfish.jaxb/jaxb-runtime
	implementation 'org.glassfish.jaxb:jaxb-runtime:4.0.5'
	
	/////////////////////////////////////

    // Use JUnit test framework
    // testCompile 'junit:junit:4.12'
}

// In this section you declare where to find the dependencies of your project
repositories {
    mavenCentral()
}
