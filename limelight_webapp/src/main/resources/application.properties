
#  application.properties

#  Main Spring Boot configuration

#  View prefix (controller-returned view name -> /WEB-INF/jsp/<name>) is now set
#  programmatically by the InternalResourceViewResolver @Bean in LimelightWebAppConfig
#  (was 'spring.mvc.view.prefix' here).  Moved to typed Java so a Spring Boot property
#  rename can't silently drop it.  See limelight_webapp/CLAUDE.md (Gotchas).


#  Disable Spring MVC displaying it's own 'whitelabel' error page
#     and passes HTTP status code to the servlet container where settings in web.xml can map to a page.
#  NOTE (Spring Boot 4): the error properties moved from 'server.error.*' to 'spring.web.error.*'.
#        The old 'server.error.*' names are silently IGNORED on Boot 4 (the namespace was removed,
#        not even kept as a deprecated alias).  See limelight_webapp/CLAUDE.md (Gotchas).
#  This one is KEPT as a property (no clean typed 'off' bean) but is guarded at startup by the
#  assert_ErrorWhitelabel_Disabled ApplicationRunner @Bean in LimelightWebAppConfig, which fails
#  the app to start (loudly) if this property ever stops binding on a future Spring Boot upgrade.
spring.web.error.whitelabel.enabled=false

#  Returning the exception reason text in the JSON error-response 'message' field (the JS code
#  matches it to decide what to do) is now forced programmatically by the ErrorAttributes @Bean
#  in LimelightWebAppConfig (was 'spring.web.error.include-message=always' / pre-Boot-4
#  'server.error.include-message=always' here).  Moved to typed Java so a property rename can't
#  silently drop it.


