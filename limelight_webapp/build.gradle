/*
 * Before the Gradle WAR processing creates the war, it copies limelight_submit_import jar to the web app  
 */
// processResources.dependsOn 'limelight_submit_import:shadowJar'

/*
 * Before the Gradle WAR processing creates the war, it copies limelight_submit_import jar to the web app  
 */
processResources.dependsOn 'copy_limelight_submit_import_ToWebapp'

/*
 * Before the Gradle WAR processing creates the war, it copies limelight_submit_import jar to the web app  
 */


task build_copy_limelight_submit_import_ToWebapp(type: GradleBuild) {

	dependsOn 'limelight_submit_import:shadowJar'
   tasks = [ 
     'copy_limelight_submit_import_ToWebapp', 
        ]
}
     
/*
 * Before the Gradle WAR processing creates the war, it copies limelight_submit_import jar to the web app  
*/
task copy_limelight_submit_import_ToWebapp(type: Sync) {
    from "../limelight_submit_import/build/libs/limelightSubmitImport.jar"
    // 'into' Must be a subdir of '/static/' that contains nothing else.  The directory contents will be deleted.
    into "src/main/webapp/static/limelightSubmitImport/" 
}


/*
 * Before the Gradle WAR processing creates the war, create file under WEB-INF with GIT Hash 
 */
processResources.dependsOn 'createFileGitHashEtc'

// import org.ajoberstar.grgit.Grgit

/*
 * Before the Gradle WAR processing creates the war, it deletes the output .war file to ensure it is always re-created.
 *  
 * Store GIT data and other data in a file stored under '$projectDir/src/main/resources/' so will be included in produced .war file.
 */

task createFileGitHashEtc(type: GradleBuild) {
  	doLast {
	  	println("Webapp Gradle build createFileGitHashEtc doLast called - Before WAR created. Create file under WEB-INF with GIT Hash Etc")
		  	
		  	
		//  Environment Variables Used
		
		//    Optional Environment Variables to Override the release displayed  	
		  	
        def limelightRelease_Tag_EnvironmentVariableName = 'LIMELIGHT_RELEASE_TAG' //  Environment variable used
        def limelightRelease_URL_EnvironmentVariableName = 'LIMELIGHT_RELEASE_TAG_URL' //  Environment variable used
        def limelightRelease_TooltipText_EnvironmentVariableName = 'LIMELIGHT_RELEASE_TAG_TOOLTIP_TEXT' //  Environment variable used
          
        def limelightRelease_EnvironmentVariableValue_DefaultValue = ''
        
        def limelightRelease_Tag_EnvironmentVariableValue = System.getenv(limelightRelease_Tag_EnvironmentVariableName)
        def limelightRelease_URL_EnvironmentVariableValue = System.getenv(limelightRelease_URL_EnvironmentVariableName)
        def limelightRelease_TooltipText_EnvironmentVariableValue = System.getenv(limelightRelease_TooltipText_EnvironmentVariableName)
        
        def limelightRelease_Tag_EnvironmentVariableValue_OrDefault = limelightRelease_Tag_EnvironmentVariableValue ?: limelightRelease_EnvironmentVariableValue_DefaultValue // Fallback if env var is not set
        def limelightRelease_URL_EnvironmentVariableValue_OrDefault = limelightRelease_URL_EnvironmentVariableValue ?: limelightRelease_EnvironmentVariableValue_DefaultValue // Fallback if env var is not set
        def limelightRelease_TooltipText_EnvironmentVariableValue_OrDefault = limelightRelease_TooltipText_EnvironmentVariableValue ?: limelightRelease_EnvironmentVariableValue_DefaultValue // Fallback if env var is not set
        
        
		println("Environment Variable value '" + limelightRelease_Tag_EnvironmentVariableName + "': " + limelightRelease_Tag_EnvironmentVariableValue )
		println("Environment Variable value '" + limelightRelease_Tag_EnvironmentVariableName + "' or Default: " + limelightRelease_Tag_EnvironmentVariableValue_OrDefault )
		       
		println("Environment Variable value '" + limelightRelease_URL_EnvironmentVariableName + "': " + limelightRelease_URL_EnvironmentVariableValue )
		println("Environment Variable value '" + limelightRelease_URL_EnvironmentVariableName + "' or Default: " + limelightRelease_URL_EnvironmentVariableValue_OrDefault )
		       
		println("Environment Variable value '" + limelightRelease_TooltipText_EnvironmentVariableName + "': " + limelightRelease_TooltipText_EnvironmentVariableValue )
		println("Environment Variable value '" + limelightRelease_TooltipText_EnvironmentVariableName + "' or Default: " + limelightRelease_TooltipText_EnvironmentVariableValue_OrDefault )
		
		//  Assign to grgit, created by plugin
		def gitRepo = grgit
		
		
		// def gitRepo = Grgit.open({
		//  dir = ".."  //  Use parent directory since that is root of GIT repo
		//  currentDir = <path>
		//  credentials = <credentals>
		// })
		
		def gitHeadId = gitRepo.head().id
		def gitCommit = gitRepo.head().getAbbreviatedId(8)
		def gitBranch = gitRepo.branch.getCurrent().getName()
		
		//  Get tag at GIT HEAD: like git tag --points-at HEAD
		def repoHead = gitRepo.head()
		def repoHeadTag = gitRepo.tag.list().find {
			it.commit == repoHead
		}
		def repoTagName = ""
		def repoTagName_NoneFound = "NO GIT Tag at HEAD"
		
		if ( repoHeadTag ) {
			println("GIT Tag at HEAD found")
			repoTagName = repoHeadTag.getName()
			repoTagName_NoneFound = ""
		}
		
		
		println("gitHeadId: " + gitHeadId )
		println("gitCommit: " + gitCommit )
		println("gitBranch: " + gitBranch )
		println("GIT Tag at HEAD: " + repoTagName )
		println("GIT Tag at HEAD None Found: " + repoTagName_NoneFound )
		
		//  The filename 'limelight_version_from_build.properties' 
		//     is also in Java code org.yeastrc.limelight.limelight_webapp.constants_config_filenames. LimelightWebapp_BuildInfo_Incl_GitHash_Filename_Constants
		
		new File("$projectDir/src/main/resources/limelight_version_from_build.properties").text = """

#  Generated by the build

limelightRelease_Tag_EnvironmentVariableValue_OrDefault=${limelightRelease_Tag_EnvironmentVariableValue_OrDefault}
limelightRelease_URL_EnvironmentVariableValue_OrDefault=${limelightRelease_URL_EnvironmentVariableValue_OrDefault}
limelightRelease_TooltipText_EnvironmentVariableValue_OrDefault=${limelightRelease_TooltipText_EnvironmentVariableValue_OrDefault}

Project-Title=${project.name}
Branch=$gitBranch
GIT-HASH=${gitCommit}
GIT-Full-HASH=${gitHeadId}
GIT-Repo-Tag-Name=${repoTagName}
GIT-Repo-Tag-Name-None-Found=${repoTagName_NoneFound}
Buildtime=${new Date().format("yyyy-MM-dd HH:mm:ssZ")}
"""
	}
}

